# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/coursemgmt
quarkus.datasource.username=coursemgmt
quarkus.datasource.password=coursemgmt123
quarkus.datasource.jdbc.max-size=8

# Hibernate ORM Configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# JWT Configuration
quarkus.smallrye-jwt.sign.key-location=META-INF/private-key.pem
quarkus.smallrye-jwt.verify.key-location=META-INF/public-key.pem
quarkus.smallrye-jwt.verify.issuer=https://example.com
quarkus.smallrye-jwt.token.header=Authorization
quarkus.smallrye-jwt.token.cookie=jwt

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200,http://localhost:80
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.credentials=true

# Server Configuration
quarkus.http.port=8080
quarkus.application.name=coursemgmt
quarkus.application.version=1.0.0

# Logging
quarkus.log.level=INFO
quarkus.log.console.enable=true
